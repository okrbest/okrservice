<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>챗봇 메뉴 UI — 최종 디자인</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #e8eaf6 0%, #f3f4fd 60%, #edf2ff 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 20px;
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Segoe UI', sans-serif;
    flex-wrap: wrap;
  }

  /* ─── 위젯 껍데기 ─── */
  .widget {
    width: 340px;
    height: 580px;
    background: #f5f6fc;
    border-radius: 22px;
    box-shadow:
      0 4px 6px rgba(91, 95, 248, 0.06),
      0 20px 48px rgba(91, 95, 248, 0.14),
      0 0 0 1px rgba(91, 95, 248, 0.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ─── 상단 헤더 ─── */
  .topbar {
    background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
    padding: 16px 18px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
  }
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 16px;
    background: #f5f6fc;
    border-radius: 16px 16px 0 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-bot-avatar {
    width: 34px; height: 34px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .topbar-info {}
  .topbar-name { color: #fff; font-size: 14px; font-weight: 700; line-height: 1.2; }
  .topbar-status { color: rgba(255,255,255,0.65); font-size: 11px; display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
  .topbar-close {
    color: rgba(255,255,255,0.6);
    font-size: 18px;
    cursor: pointer;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    transition: background 0.15s;
  }
  .topbar-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

  /* ─── 봇 인사 ─── */
  .chat-area {
    padding: 18px 16px 10px;
    flex-shrink: 0;
  }
  .bot-row { display: flex; align-items: flex-end; gap: 8px; }
  .bot-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
  }
  .bot-bubble {
    background: #fff;
    border-radius: 4px 14px 14px 14px;
    padding: 10px 14px;
    font-size: 13px;
    color: #374151;
    line-height: 1.55;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    max-width: 260px;
  }
  .bot-bubble strong { color: #4F46E5; }

  /* ─── 메뉴 영역 ─── */
  .menu-area {
    flex: 1;
    overflow-y: auto;
    padding: 4px 14px 12px;
    scrollbar-width: thin;
    scrollbar-color: #d4d6f5 transparent;
  }
  .menu-area::-webkit-scrollbar { width: 4px; }
  .menu-area::-webkit-scrollbar-thumb { background: #d4d6f5; border-radius: 4px; }

  /* ─── 카테고리 섹션 ─── */
  .category { margin-bottom: 14px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 0 2px;
  }
  .category-label {
    font-size: 11px;
    font-weight: 700;
    color: #6366f1;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .category-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #ddd5fe 0%, transparent 100%);
    border-radius: 1px;
  }

  /* ─── 카드 그리드 ─── */
  .card-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; }
  .card-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }

  .card-item {
    background: #fff;
    border: 1.5px solid #ebebf5;
    border-radius: 12px;
    padding: 0 8px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 12.5px;
    font-weight: 500;
    color: #374151;
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.4;
    box-shadow: 0 1px 3px rgba(99, 102, 241, 0.06);
    position: relative;
    overflow: hidden;
  }
  .card-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #a78bfa);
    opacity: 0;
    transition: opacity 0.18s;
  }
  .card-item:hover {
    background: linear-gradient(135deg, #6366f1 0%, #7c3aed 100%);
    border-color: transparent;
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(99, 102, 241, 0.28);
  }
  .card-item:hover::before { opacity: 0; }

  /* ─── 바텀 네비 ─── */
  .bottomnav {
    display: flex;
    border-top: 1px solid #ebebf5;
    padding: 6px 0 8px;
    background: #fff;
    flex-shrink: 0;
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: #bbb; font-size: 10px; cursor: pointer; position: relative; padding: 3px 0;
    transition: color 0.15s;
  }
  .nav-item.active { color: #6366f1; font-weight: 700; }
  .nav-item:hover:not(.active) { color: #9ca3af; }
  .nav-item svg { width: 20px; height: 20px; }
  .nav-dot {
    position: absolute; top: 2px; right: calc(50% - 14px);
    width: 7px; height: 7px;
    background: #ef4444;
    border-radius: 50%;
    border: 1.5px solid #fff;
  }
  .nav-label { font-size: 10px; }

  /* active 언더바 */
  .nav-item.active::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 2px;
    background: #6366f1;
    border-radius: 2px;
  }
</style>
</head>
<body>

<!-- 최종 디자인: C 스타일 + 카테고리 섹션 -->
<div class="widget">

  <!-- 헤더 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-bot-avatar">🤖</div>
      <div class="topbar-info">
        <div class="topbar-name">HR 어시스턴트</div>
        <div class="topbar-status"><span class="status-dot"></span>온라인</div>
      </div>
    </div>
    <div class="topbar-close">✕</div>
  </div>

  <!-- 봇 인사 -->
  <div class="chat-area">
    <div class="bot-row">
      <div class="bot-avatar">🤖</div>
      <div class="bot-bubble">
        안녕하세요! 👋<br>
        <strong>5240 HR 시스템</strong>의 주요 기능을<br>아래에서 바로 이용하세요.
      </div>
    </div>
  </div>

  <!-- 메뉴 영역 -->
  <div class="menu-area">

    <!-- 근태관리 -->
    <div class="category">
      <div class="card-grid">
        <div class="card-item">출퇴근<br>체크</div>
        <div class="card-item">출퇴근<br>변경</div>
        <div class="card-item">근무일정<br>조회</div>
      </div>
    </div>

    <!-- 휴가·신청 -->
    <div class="category">
      <div class="category-header">
        <span class="category-line" style="background: linear-gradient(90deg, #e0e0f0 0%, transparent 100%);"></span>
      </div>
      <div class="card-grid">
        <div class="card-item">휴가신청</div>
        <div class="card-item">연장근무<br>신청</div>
        <div class="card-item">출장신청</div>
        <div class="card-item">조퇴/외출<br>신청</div>
        <div class="card-item">경조휴가<br>신청</div>
      </div>
    </div>

    <!-- 결재·지원 -->
    <div class="category">
      <div class="category-header">
        <span class="category-line" style="background: linear-gradient(90deg, #e0e0f0 0%, transparent 100%);"></span>
      </div>
      <div class="card-grid-2">
        <div class="card-item">결재함</div>
        <div class="card-item">경조금신청</div>
      </div>
    </div>

  </div>

  <!-- 바텀 네비 -->
  <div class="bottomnav">
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="13" rx="2"/><path d="M8 21l4-4 4 4"/><circle cx="8" cy="9" r="1" fill="currentColor"/><circle cx="12" cy="9" r="1" fill="currentColor"/><circle cx="16" cy="9" r="1" fill="currentColor"/></svg>
      <span class="nav-label">챗봇</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 5H6a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V9l-5-4z"/></svg>
      <div class="nav-dot"></div>
      <span class="nav-label">티켓</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span class="nav-label">Help</span>
    </div>
  </div>

</div>

</body>
</html>
