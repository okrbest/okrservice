openapi: 3.0.3
info:
  title: 영업 파이프라인 관리 웹페이지 연동 API
  description: |
    서비스데스크 영업 파이프라인과 외부 관리 웹페이지 간 연동 API.

    ## 인증
    모든 요청에 `X-ADMIN-SECRET` 헤더 필요.
    시크릿 값은 서비스데스크 파이프라인 설정의 **관리 웹페이지 시크릿 키**와 동일해야 합니다.

    ## 연동 필드
    - **고객 정보** (읽기 전용): 회사명, 담당자, 연락처, 이메일, 직원규모, 유입경로
    - **문의 내용** (읽기 전용): 제목, 내용, 첨부파일
    - **영업 필드** (수정 가능, 8개): 직전소통일, 안내자, 관심모듈, 진행, 데모생성, 견적, 미팅, 비고

  version: 2.0.0

servers:
  - url: http://localhost:4000/api/sales
    description: 로컬 개발 서버
  - url: https://5240help.okrbiz.com/gateway/api/sales
    description: 프로덕션 서버

components:
  securitySchemes:
    AdminSecret:
      type: apiKey
      in: header
      name: X-ADMIN-SECRET
      description: 파이프라인 설정에서 지정한 시크릿 키

  schemas:
    DealFields:
      type: object
      description: 수정 가능한 영업 필드 8개
      properties:
        직전소통일:
          type: string
          example: "2026-06-04"
        안내자:
          type: string
          description: 담당 유저 이름 (여러 명이면 쉼표 구분)
          example: "홍길동, 김철수"
        관심모듈:
          type: string
          example: "근태"
        진행:
          type: string
          enum: [진행, 수주, 실주, 중단, 해지, 보류, 미도입]
          example: "진행"
        데모생성:
          type: string
          enum: [미생성, 생성요청, 생성완료, 불필요]
          example: "생성완료"
        견적:
          type: string
          enum: [미발행, 발행요청, 발행완료, 불필요]
          example: "발행완료"
        미팅:
          type: string
          enum: [미정, 일정조율, 예정, 완료, 취소]
          example: "완료"
        비고:
          type: string
          example: "대표 직접 참여 요청"

    FullDealPayload:
      type: object
      description: web-push upsert 시 전송되는 전체 딜 데이터
      properties:
        회사명:
          type: string
          example: "ABC테크"
        담당자:
          type: string
          example: "김민수"
        연락처:
          type: string
          example: "010-1234-5678"
        이메일:
          type: string
          example: "minsu.kim@example.com"
        직원규모:
          type: string
          example: "51~100명"
        유입경로:
          type: string
          example: "홈페이지"
        제목:
          type: string
          example: "OKR 솔루션 도입 문의"
        내용:
          type: string
          example: "성과관리와 OKR 운영을 위한 데모 및 견적을 받고 싶습니다."
        첨부파일:
          type: array
          items:
            type: string
          example: ["https://example.com/files/문의서.pdf"]
        직전소통일:
          type: string
          example: "2026-06-04"
        안내자:
          type: string
          example: "홍길동"
        관심모듈:
          type: string
          example: "근태"
        진행:
          type: string
          enum: [진행, 수주, 실주, 중단, 해지, 보류, 미도입]
          example: "진행"
        데모생성:
          type: string
          enum: [미생성, 생성요청, 생성완료, 불필요]
          example: "생성완료"
        견적:
          type: string
          enum: [미발행, 발행요청, 발행완료, 불필요]
          example: "발행완료"
        미팅:
          type: string
          enum: [미정, 일정조율, 예정, 완료, 취소]
          example: "완료"
        비고:
          type: string
          example: ""

    DealSyncPushUpsert:
      type: object
      description: 딜 생성/수정/이동 시 web-push 페이로드
      required:
        - event
        - dealId
        - mailStatus
        - mailSentAt
        - deal
      properties:
        event:
          type: string
          enum: [upsert]
          example: "upsert"
        dealId:
          type: string
          example: "abc123"
        mailStatus:
          type: string
          enum: [미발송, 발송완료]
          description: 메일 발송 상태
          example: "발송완료"
        mailSentAt:
          type: string
          description: 최초 메일 발송일 (YYYY-MM-DD). 미발송이면 빈 문자열
          example: "2026-06-05"
        deal:
          $ref: '#/components/schemas/FullDealPayload'

    DealSyncPushDelete:
      type: object
      description: 딜 삭제 시 web-push 페이로드
      required:
        - event
        - dealId
      properties:
        event:
          type: string
          enum: [delete]
          example: "delete"
        dealId:
          type: string
          example: "abc123"

    AdminWebhookRequest:
      type: object
      required:
        - dealId
        - changes
      properties:
        dealId:
          type: string
          example: "abc123"
        changes:
          type: object
          description: 수정된 필드만 포함 (8개 필드 중 변경된 것만)
          additionalProperties:
            type: string
          example:
            안내자: "홍길동"
            비고: "계약 조건 재검토 필요"

    AdminWebhookResponse:
      type: object
      properties:
        success:
          type: boolean
        updatedFields:
          type: array
          items:
            type: string
          example: ["안내자", "비고"]
        deal:
          $ref: '#/components/schemas/DealFields'

    SendMailRequest:
      type: object
      required:
        - dealId
        - to
        - subject
        - body
      properties:
        dealId:
          type: string
          example: "abc123"
        to:
          type: string
          description: 받는 사람 이메일
          example: "minsu.kim@example.com"
        cc:
          type: string
          description: 참조 이메일 (선택)
          example: "manager@example.com"
        subject:
          type: string
          example: "Re: OKR 솔루션 도입 문의"
        body:
          type: string
          example: "김민수님 안녕하세요.\n\n문의주신 서비스 관련하여 안내드립니다..."
        attachments:
          type: array
          items:
            type: string
          description: 첨부파일 URL 목록 (선택)
          example: []

    SendMailResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    CreateDealRequest:
      type: object
      required:
        - 회사명
        - 담당자
        - 이메일
      properties:
        회사명:
          type: string
          example: "신규테크"
        담당자:
          type: string
          example: "홍길동"
        연락처:
          type: string
          example: "010-0000-1111"
        이메일:
          type: string
          example: "hong@example.com"
        직원규모:
          type: string
          example: "11~50명"
        유입경로:
          type: string
          example: "홈페이지"
        제목:
          type: string
          example: "급여 모듈 도입 문의"
        내용:
          type: string
          example: "급여 관련 모듈 견적 요청합니다."
        첨부파일:
          type: array
          items:
            type: string
          example: []
        직전소통일:
          type: string
          example: "2026-06-16"
        안내자:
          type: string
          description: 담당자 이름으로 사용자 매핑 (쉼표 구분 다중 가능)
          example: "박지현"
        관심모듈:
          type: string
          example: "급여"
        진행:
          type: string
          enum: [진행, 수주, 실주, 중단, 해지, 보류, 미도입]
          example: "진행"
        데모생성:
          type: string
          enum: [미생성, 생성요청, 생성완료, 불필요]
          example: "미생성"
        견적:
          type: string
          enum: [미발행, 발행요청, 발행완료, 불필요]
          example: "미발행"
        미팅:
          type: string
          enum: [미정, 일정조율, 예정, 완료, 취소]
          example: "미정"
        비고:
          type: string
          example: ""

    CreateDealResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        dealId:
          type: string
          description: 생성된 딜의 서비스데스크 ID
          example: "xyz789"

    HistoryItem:
      type: object
      properties:
        type:
          type: string
          enum: [수신, 발신]
          example: "발신"
        date:
          type: string
          description: "소통 일시 (YYYY-MM-DD HH:mm)"
          example: "2026-06-05 09:10"
        subject:
          type: string
          example: "Re: 데모 계정 요청"
        body:
          type: string
          example: "데모 계정 안내 및 미팅 가능 일정 전달"

    HistoryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        dealId:
          type: string
          example: "abc123"
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryItem'

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          enum: [UNAUTHORIZED, MISSING_FIELDS, DEAL_NOT_FOUND, STAGE_NOT_FOUND, METHOD_NOT_ALLOWED]
          example: "UNAUTHORIZED"

security:
  - AdminSecret: []

paths:
  /deals:
    get:
      summary: 파이프라인 전체 딜 목록 조회 — DB 새로고침 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        관리자가 **DB 새로고침** 버튼을 클릭할 때 호출합니다.
        `X-ADMIN-SECRET`으로 파이프라인을 특정하고, 해당 파이프라인의 활성 딜 전체를
        web-push upsert 포맷으로 반환합니다.
      security:
        - AdminSecret: []
      parameters:
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      responses:
        '200':
          description: 조회 성공 (딜 없으면 `deals: []`)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  deals:
                    type: array
                    items:
                      $ref: '#/components/schemas/DealSyncPushUpsert'
              example:
                success: true
                deals:
                  - event: "upsert"
                    dealId: "abc123"
                    deal:
                      회사명: "ABC테크"
                      담당자: "김민수"
                      연락처: "010-1234-5678"
                      이메일: "minsu.kim@example.com"
                      직원규모: "51~100명"
                      유입경로: "홈페이지"
                      제목: "OKR 솔루션 도입 문의"
                      내용: "성과관리와 OKR 운영을 위한 데모 및 견적을 받고 싶습니다."
                      첨부파일: []
                      직전소통일: "2026-06-04"
                      안내자: "홍길동"
                      관심모듈: "근태"
                      진행: "진행"
                      데모생성: "생성완료"
                      견적: "발행완료"
                      미팅: "완료"
                      비고: ""
        '400':
          description: 시크릿 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "MISSING_FIELDS"
        '401':
          description: 시크릿 불일치 또는 관리 웹 연동 비활성
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"
    post:
      summary: 딜 신규 생성 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        관리 웹페이지에서 직접 딜을 생성합니다.
        생성된 딜은 서비스데스크 DB에 저장되고, 약 **800ms 후** 서비스데스크가
        `POST /deals/web-push (event: "upsert")`로 관리 웹에 콜백하여 `dealId` 포함 최신 데이터를 동기화합니다.

        - `회사명`, `담당자`, `이메일`은 필수
        - 나머지 필드는 선택 (생략 시 빈값 처리)
        - 딜은 파이프라인의 첫 번째 스테이지에 생성됨
        - 시크릿은 파이프라인의 `adminPageSecret`으로 파이프라인을 특정함
      security:
        - AdminSecret: []
      parameters:
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDealRequest'
            example:
              회사명: "신규테크"
              담당자: "홍길동"
              연락처: "010-0000-1111"
              이메일: "hong@example.com"
              직원규모: "11~50명"
              유입경로: "홈페이지"
              제목: "급여 모듈 도입 문의"
              내용: "급여 관련 모듈 견적 요청합니다."
              첨부파일: []
              직전소통일: "2026-06-16"
              안내자: "박지현"
              관심모듈: "급여"
              진행: "진행"
              데모생성: "미생성"
              견적: "미발행"
              미팅: "미정"
              비고: ""
      responses:
        '200':
          description: 딜 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDealResponse'
              example:
                success: true
                dealId: "xyz789"
        '400':
          description: 필수 필드(회사명/담당자/이메일) 누락 또는 파이프라인에 스테이지 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                필수필드누락:
                  value:
                    success: false
                    error: "MISSING_FIELDS"
                    message: "회사명, 담당자, 이메일은 필수입니다."
                스테이지없음:
                  value:
                    success: false
                    error: "STAGE_NOT_FOUND"
                    message: "파이프라인에 스테이지가 없습니다."
        '401':
          description: 인증 실패 (시크릿 불일치 또는 관리 웹 연동 비활성)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"

  /deals/{dealId}:
    delete:
      summary: 딜 삭제 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        관리 웹페이지에서 딜을 삭제합니다.
        서비스데스크 DB에서도 삭제되며, 약 **800ms 후** 서비스데스크가
        `POST /deals/web-push (event: "delete")`로 관리 웹에 삭제 이벤트를 콜백합니다.
      security:
        - AdminSecret: []
      parameters:
        - in: path
          name: dealId
          required: true
          schema:
            type: string
          description: 삭제할 딜의 서비스데스크 ID
          example: "abc123"
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      responses:
        '200':
          description: 딜 삭제 성공
          content:
            application/json:
              example:
                success: true
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"
        '404':
          description: 딜을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "DEAL_NOT_FOUND"

  /deals/{dealId}/history:
    get:
      summary: 소통 이력 조회 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        특정 딜의 수·발신 소통 이력을 조회합니다.
        이력은 최신순(내림차순)으로 반환됩니다.
        이력이 없으면 `history: []` 반환.

        소통 이력은 `POST /deals/send-mail` 호출 시 자동으로 기록됩니다.
      security:
        - AdminSecret: []
      parameters:
        - in: path
          name: dealId
          required: true
          schema:
            type: string
          description: 조회할 딜의 서비스데스크 ID
          example: "abc123"
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'
              example:
                success: true
                dealId: "abc123"
                history:
                  - type: "발신"
                    date: "2026-06-05 09:10"
                    subject: "Re: 데모 계정 요청"
                    body: "데모 계정 안내 및 미팅 가능 일정 전달"
                  - type: "수신"
                    date: "2026-06-04 15:30"
                    subject: "데모 계정 요청"
                    body: "인사팀 검토용 데모 계정 요청"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"
        '404':
          description: 딜을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "DEAL_NOT_FOUND"

  /deals/dbupdate:
    post:
      summary: 딜 필드 수정 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        관리자가 웹페이지에서 딜 필드를 수정하고 저장할 때 호출합니다.
        수정된 필드만 `changes`에 담아서 요청하면 서비스데스크 DB에 반영됩니다.
        처리 완료 후 최신 영업 필드 8개를 응답으로 반환합니다.

        충돌 감지 없이 덮어씁니다.
      security:
        - AdminSecret: []
      parameters:
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminWebhookRequest'
            examples:
              단일 필드 수정:
                summary: 비고 하나만 수정
                value:
                  dealId: "abc123"
                  changes:
                    비고: "추가 미팅 필요"
              다중 필드 수정:
                summary: 여러 필드 동시 수정
                value:
                  dealId: "abc123"
                  changes:
                    안내자: "홍길동"
                    진행: "진행"
                    견적: "발행완료"
      responses:
        '200':
          description: 업데이트 성공 (최신 딜 영업 필드 반환)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminWebhookResponse'
              example:
                success: true
                updatedFields: ["안내자", "진행", "견적"]
                deal:
                  직전소통일: "2026-06-04"
                  안내자: "홍길동"
                  관심모듈: "근태"
                  진행: "진행"
                  데모생성: "생성완료"
                  견적: "발행완료"
                  미팅: "완료"
                  비고: ""
        '400':
          description: 필수 필드 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "MISSING_FIELDS"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"
        '404':
          description: 딜을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "DEAL_NOT_FOUND"

  /deals/send-mail:
    post:
      summary: 메일 직접 발송 (웹페이지 → 서비스데스크)
      description: |
        ## 웹페이지 팀이 호출하는 API

        관리자가 웹페이지에서 메일 내용을 작성하고 발송 버튼을 클릭할 때 호출합니다.
        서비스데스크 자동화 트리거 `sales:deal.manualMail`을 발화하고,
        발송 내용은 소통 이력(`GET /deals/{dealId}/history`)에 자동으로 기록됩니다.

        **서비스데스크 자동화 설정 필요**: 서비스데스크 UI → 자동화 → 트리거 `Manual mail trigger` 선택 후 이메일 액션 설정.
      security:
        - AdminSecret: []
      parameters:
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 파이프라인 설정의 시크릿 키
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMailRequest'
            example:
              dealId: "abc123"
              to: "minsu.kim@example.com"
              cc: ""
              subject: "Re: OKR 솔루션 도입 문의"
              body: "김민수님 안녕하세요.\n\n문의주신 서비스 관련하여 안내드립니다..."
              attachments: []
      responses:
        '200':
          description: 발송 성공 및 소통 이력 기록 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendMailResponse'
              example:
                success: true
        '400':
          description: 필수 필드(dealId/to/subject/body) 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "MISSING_FIELDS"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "UNAUTHORIZED"
        '404':
          description: 딜을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "DEAL_NOT_FOUND"

  /deals/web-push:
    post:
      summary: 딜 변경 Push 수신 (서비스데스크 → 웹페이지, 웹 서버에서 구현)
      description: |
        ## 관리 웹페이지 팀이 구현해야 하는 API

        서비스데스크(sales-api)가 딜 생성·수정·이동·삭제 시 웹 서버로 Push합니다.
        `event` 필드로 이벤트 종류를 구분합니다.

        - `upsert`: 딜 생성/수정/이동 — 전체 딜 데이터 포함
        - `delete`: 딜 삭제 — `dealId`만 포함

        딜 생성·수정·이동 후 약 **800ms 뒤**에 자동 호출됩니다.
      security:
        - AdminSecret: []
      parameters:
        - in: header
          name: X-ADMIN-SECRET
          required: true
          schema:
            type: string
          description: 인증 시크릿
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/DealSyncPushUpsert'
                - $ref: '#/components/schemas/DealSyncPushDelete'
              discriminator:
                propertyName: event
                mapping:
                  upsert: '#/components/schemas/DealSyncPushUpsert'
                  delete: '#/components/schemas/DealSyncPushDelete'
            examples:
              딜 생성/수정:
                summary: 딜이 생성되거나 수정됐을 때
                value:
                  event: "upsert"
                  dealId: "abc123"
                  mailStatus: "발송완료"
                  mailSentAt: "2026-06-05"
                  deal:
                    회사명: "ABC테크"
                    담당자: "김민수"
                    연락처: "010-1234-5678"
                    이메일: "minsu.kim@example.com"
                    직원규모: "51~100명"
                    유입경로: "홈페이지"
                    제목: "OKR 솔루션 도입 문의"
                    내용: "성과관리와 OKR 운영을 위한 데모 및 견적을 받고 싶습니다."
                    첨부파일: ["https://example.com/files/문의서.pdf"]
                    직전소통일: "2026-06-04"
                    안내자: "홍길동"
                    관심모듈: "근태"
                    진행: "진행"
                    데모생성: "생성완료"
                    견적: "발행완료"
                    미팅: "완료"
                    비고: ""
              딜 삭제:
                summary: 딜이 삭제됐을 때
                value:
                  event: "delete"
                  dealId: "abc123"
      responses:
        '200':
          description: 정상 수신 (관리 웹페이지가 반환해야 하는 응답)
          content:
            application/json:
              example:
                ok: true
